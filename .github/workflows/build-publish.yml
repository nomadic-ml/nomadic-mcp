name: Build and Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller
      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name nomadicml-mcp-darwin-arm64 \
            --distpath dist/ \
            src/nomadicml_mcp/server.py
      - uses: actions/upload-artifact@v4
        with:
          name: nomadicml-mcp-darwin-arm64
          path: dist/nomadicml-mcp-darwin-arm64

  build-macos-x64:
    name: Build macOS (Intel)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller
      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name nomadicml-mcp-darwin-x64 \
            --distpath dist/ \
            src/nomadicml_mcp/server.py
      - uses: actions/upload-artifact@v4
        with:
          name: nomadicml-mcp-darwin-x64
          path: dist/nomadicml-mcp-darwin-x64

  build-linux-x64:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller
      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name nomadicml-mcp-linux-x64 \
            --distpath dist/ \
            src/nomadicml_mcp/server.py
      - uses: actions/upload-artifact@v4
        with:
          name: nomadicml-mcp-linux-x64
          path: dist/nomadicml-mcp-linux-x64

  build-windows-x64:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller
      - name: Build binary
        run: |
          pyinstaller `
            --onefile `
            --name nomadicml-mcp-win32-x64 `
            --distpath dist/ `
            src/nomadicml_mcp/server.py
      - uses: actions/upload-artifact@v4
        with:
          name: nomadicml-mcp-win32-x64
          path: dist/nomadicml-mcp-win32-x64.exe

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos-arm64, build-macos-x64, build-linux-x64, build-windows-x64]
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
      - name: Flatten dist directory
        run: |
          find dist/ -type f | xargs -I{} mv {} dist/
          find dist/ -type d -empty -delete
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
